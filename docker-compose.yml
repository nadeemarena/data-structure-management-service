services:

  api:
    build: .
    container_name: data-structure-api
    ports:
      - "8000:8000"
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000"
      ]

  tests:
    build: .
    container_name: data-structure-tests
    command:
      [
        "uv",
        "run",
        "pytest",
        "-v"
      ]